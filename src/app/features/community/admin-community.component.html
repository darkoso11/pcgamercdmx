<app-admin-header></app-admin-header>

<main class="min-h-screen bg-[#071029] px-6 py-8 text-white">
  <div class="mx-auto max-w-7xl">
    <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
      <div>
        <h1 class="text-3xl font-black text-cyan-300">ADMIN - Comunidad</h1>
        <p class="mt-2 text-sm uppercase tracking-[0.18em] text-slate-400">Colaboradores e influencers</p>
      </div>
      <a routerLink="/colaboradores" class="rounded-lg border border-cyan-300/40 px-4 py-2 text-sm font-bold text-cyan-200 hover:bg-cyan-300/10">
        Ver pagina publica
      </a>
    </div>

    <div class="mb-6 flex flex-wrap gap-3">
      <button
        type="button"
        (click)="activeTab = 'profiles'"
        class="rounded-lg px-4 py-2 font-bold transition"
        [ngClass]="activeTab === 'profiles' ? 'bg-cyan-400 text-[#071029]' : 'border border-white/10 text-slate-300 hover:border-cyan-300/40'"
      >
        Perfiles
      </button>
      <button
        type="button"
        (click)="activeTab = 'page'"
        class="rounded-lg px-4 py-2 font-bold transition"
        [ngClass]="activeTab === 'page' ? 'bg-pink-400 text-[#071029]' : 'border border-white/10 text-slate-300 hover:border-pink-300/40'"
      >
        Aspectos de pagina
      </button>
    </div>

    <section *ngIf="activeTab === 'profiles'" class="grid gap-6 lg:grid-cols-[1fr_1.35fr]">
      <form class="rounded-xl border border-cyan-300/15 bg-[#0b1220] p-5" (ngSubmit)="saveProfile()">
        <div class="mb-5 flex items-center justify-between">
          <h2 class="text-xl font-black">{{ editingId ? 'Editar perfil' : 'Agregar perfil' }}</h2>
          <button type="button" (click)="newProfile()" class="text-sm font-bold text-cyan-300 hover:text-white">Nuevo</button>
        </div>

        <div class="grid gap-4">
          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Nombre</span>
            <input [(ngModel)]="editor.name" name="name" required class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
          </label>

          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Slug</span>
            <input [(ngModel)]="editor.slug" name="slug" placeholder="se genera si se deja vacio" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
          </label>

          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Imagen URL o asset</span>
            <input [(ngModel)]="editor.image" name="image" required placeholder="assets/img/colaboradores/nombre.jpg" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
          </label>

          <div *ngIf="editor.image" class="overflow-hidden rounded-lg border border-white/10 bg-[#071029] p-3">
            <img [src]="editor.image" [alt]="editor.name || 'Preview'" class="mx-auto aspect-square max-h-72 w-full object-cover" />
          </div>

          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Rol</span>
            <input [(ngModel)]="editor.role" name="role" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
          </label>

          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Descripcion</span>
            <textarea [(ngModel)]="editor.bio" name="bio" rows="5" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300"></textarea>
          </label>

          <div class="grid gap-4 sm:grid-cols-2">
            <label class="space-y-2">
              <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Instagram</span>
              <input [(ngModel)]="editor.instagram" name="instagram" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
            </label>
            <label class="space-y-2">
              <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Twitch</span>
              <input [(ngModel)]="editor.twitch" name="twitch" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
            </label>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <label class="space-y-2">
              <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Orden</span>
              <input [(ngModel)]="editor.sortOrder" name="sortOrder" type="number" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-cyan-300" />
            </label>
            <div class="flex items-center gap-5 pt-6">
              <label class="flex items-center gap-2 text-sm text-slate-300">
                <input [(ngModel)]="editor.featured" name="featured" type="checkbox" />
                Destacado
              </label>
              <label class="flex items-center gap-2 text-sm text-slate-300">
                <input [(ngModel)]="editor.published" name="published" type="checkbox" />
                Publicado
              </label>
            </div>
          </div>

          <button type="submit" class="rounded-lg bg-gradient-to-r from-cyan-400 to-pink-500 px-5 py-3 font-black text-[#071029]">
            Guardar perfil
          </button>
        </div>
      </form>

      <section class="rounded-xl border border-white/10 bg-[#0b1220] p-5">
        <div class="mb-5 flex items-center justify-between gap-4">
          <div>
            <h2 class="text-xl font-black">Perfiles registrados</h2>
            <p class="text-sm text-slate-400">{{ collaborators.length }} colaboradores</p>
          </div>
          <button type="button" (click)="resetSeed()" class="text-sm font-bold text-slate-400 hover:text-white">Restaurar base</button>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <article *ngFor="let item of collaborators" class="grid grid-cols-[76px_1fr] gap-3 rounded-lg border border-white/10 bg-[#071029] p-3">
            <img [src]="item.image" [alt]="item.name" class="h-20 w-20 rounded-lg object-cover" />
            <div class="min-w-0">
              <div class="flex items-start justify-between gap-2">
                <div>
                  <h3 class="truncate font-bold">{{ item.name }}</h3>
                  <p class="text-xs text-slate-400">{{ item.slug }}</p>
                </div>
                <span class="rounded-full px-2 py-1 text-[10px] font-bold" [ngClass]="item.published ? 'bg-green-400/15 text-green-300' : 'bg-yellow-400/15 text-yellow-300'">
                  {{ item.published ? 'Publicado' : 'Borrador' }}
                </span>
              </div>
              <div class="mt-3 flex gap-3 text-sm">
                <button type="button" (click)="edit(item)" class="font-bold text-cyan-300 hover:text-white">Editar</button>
                <button type="button" (click)="deleteProfile(item.id)" class="font-bold text-red-300 hover:text-white">Borrar</button>
              </div>
            </div>
          </article>
        </div>
      </section>
    </section>

    <section *ngIf="activeTab === 'page'" class="rounded-xl border border-pink-300/20 bg-[#0b1220] p-5">
      <form class="grid gap-4" (ngSubmit)="saveSettings()">
        <label class="space-y-2">
          <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Eyebrow</span>
          <input [(ngModel)]="settings.eyebrow" name="eyebrow" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-pink-300" />
        </label>
        <label class="space-y-2">
          <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Titulo</span>
          <input [(ngModel)]="settings.title" name="title" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-pink-300" />
        </label>
        <label class="space-y-2">
          <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Descripcion</span>
          <textarea [(ngModel)]="settings.subtitle" name="subtitle" rows="4" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-pink-300"></textarea>
        </label>
        <div class="grid gap-4 md:grid-cols-2">
          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">Texto CTA detalle</span>
            <input [(ngModel)]="settings.detailCtaLabel" name="detailCtaLabel" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-pink-300" />
          </label>
          <label class="space-y-2">
            <span class="text-xs uppercase tracking-[0.18em] text-slate-400">URL CTA detalle</span>
            <input [(ngModel)]="settings.detailCtaUrl" name="detailCtaUrl" class="w-full rounded-lg border border-white/10 bg-[#071029] px-4 py-3 outline-none focus:border-pink-300" />
          </label>
        </div>
        <button type="submit" class="w-fit rounded-lg bg-pink-500 px-5 py-3 font-black text-white hover:bg-pink-400">
          Guardar pagina
        </button>
      </form>
    </section>
  </div>
</main>
