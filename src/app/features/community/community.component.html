<main class="min-h-screen bg-[#070a1c] text-white">
  <section class="relative overflow-hidden border-b border-cyan-300/20 px-6 pb-12 pt-28">
    <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_18%_16%,rgba(34,211,238,0.16),transparent_28%),radial-gradient(circle_at_82%_14%,rgba(236,72,153,0.18),transparent_30%)]"></div>
    <div class="relative mx-auto max-w-6xl text-center">
      <p class="text-xs font-bold uppercase tracking-[0.32em] text-cyan-300">{{ settings.eyebrow }}</p>
      <h1 class="mt-4 font-['Orbitron'] text-4xl font-black leading-tight md:text-6xl">
        {{ settings.title }}
      </h1>
      <div class="mx-auto mt-4 h-1 w-16 bg-gradient-to-r from-cyan-300 via-pink-500 to-violet-400"></div>
      <p class="mx-auto mt-8 max-w-3xl text-base leading-8 text-slate-300 md:text-lg">
        {{ settings.subtitle }}
      </p>
    </div>
  </section>

  <section class="mx-auto max-w-7xl px-6 py-12">
    <div class="mb-8 flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
      <div>
        <p class="text-xs uppercase tracking-[0.24em] text-pink-300">Roster activo</p>
        <h2 class="mt-2 text-2xl font-bold">Comunidad destacada</h2>
      </div>
      <p class="text-sm text-slate-400">{{ collaborators.length }} perfiles publicados</p>
    </div>

    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      <article
        *ngFor="let collaborator of collaborators"
        class="group overflow-hidden rounded-xl border border-cyan-300/15 bg-[#101633] shadow-[0_20px_60px_rgba(0,0,0,0.32)] transition hover:-translate-y-1 hover:border-pink-400/70 hover:shadow-[0_0_34px_rgba(236,72,153,0.22)]"
      >
        <a [routerLink]="['/colaboradores', collaborator.slug]" class="block">
          <div class="relative aspect-square overflow-hidden bg-[#070a1c]">
            <img
              [src]="collaborator.image"
              [alt]="collaborator.name"
              class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
            />
            <div class="absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-[#101633] to-transparent"></div>
            <span
              *ngIf="collaborator.featured"
              class="absolute left-3 top-3 rounded-full border border-cyan-300/40 bg-cyan-300/10 px-3 py-1 text-[10px] font-bold uppercase tracking-[0.18em] text-cyan-200"
            >
              Featured
            </span>
          </div>
          <div class="space-y-3 p-4">
            <h3 class="font-['Orbitron'] text-lg font-black text-white group-hover:text-cyan-200">
              {{ collaborator.name }}
            </h3>
            <p class="text-xs uppercase tracking-[0.18em] text-pink-300">{{ collaborator.role }}</p>
            <span class="inline-flex text-sm font-bold text-cyan-300 transition group-hover:text-white group-hover:drop-shadow-[0_0_12px_rgba(34,211,238,0.9)]">
              Ver perfil
            </span>
          </div>
        </a>
      </article>
    </div>
  </section>
</main>
