<div class="font-orbitron">
  <section class="relative h-screen w-full flex flex-col bg-gradient-to-br from-[#0f172a] via-[#1e293b] to-[#0ea5e9] overflow-hidden">
    <div class="absolute top-16 md:top-20 right-12 z-20 hidden md:block">
      <app-hero-slider [items]="sliderImages" [options]="{ autoplay: true, autoplayDelay: 4000 }"></app-hero-slider>
    </div>

    <nav class="absolute bottom-32 left-12 z-20 hidden md:flex flex-col gap-0 items-start ultra:bottom-24 ultra:left-6" aria-label="Accesos destacados">
      <ul class="flex flex-col min-w-[180px] ultra:min-w-[140px] ultra:text-sm">
        <li>
          <a routerLink="/sorteos" class="menu-secundario block py-1 px-4 border-t-2 border-white/80 font-bold transition-colors duration-200 ultra:py-0.5 ultra:px-2" style="--hover-bg: #ec4899; --hover-text: #fff">Play</a>
        </li>
        <li>
          <a routerLink="/galeria" class="menu-secundario block py-1 px-4 border-t-2 border-white/80 font-bold transition-colors duration-200 ultra:py-0.5 ultra:px-2" style="--hover-bg: #22d3ee; --hover-text: #222">Galeria</a>
        </li>
        <li>
          <a routerLink="/cotiza-tu-pc" class="menu-secundario block py-1 px-4 border-t-2 border-white/80 font-bold transition-colors duration-200 ultra:py-0.5 ultra:px-2" style="--hover-bg: #a78bfa; --hover-text: #222">Cotizacion</a>
        </li>
        <li>
          <a routerLink="/blog" class="menu-secundario block py-1 px-4 border-t-2 border-b-2 border-white/80 font-bold transition-colors duration-200 ultra:py-0.5 ultra:px-2" style="--hover-bg: #fde047; --hover-text: #222">Blog</a>
        </li>
      </ul>
    </nav>

    <div class="fixed top-20 md:left-12 left-4 z-50 flex gap-2" aria-hidden="true">
      <div class="w-2 h-2 md:w-3 md:h-3 bg-pink-500 rounded-sm shadow-neon cyber-dot-magenta"></div>
      <div class="w-2 h-2 md:w-3 md:h-3 bg-cyan-400 rounded-sm shadow-neon cyber-dot-cyan"></div>
      <div class="w-2 h-2 md:w-3 md:h-3 bg-purple-500 rounded-sm shadow-neon cyber-dot-purple"></div>
      <div class="w-2 h-2 md:w-3 md:h-3 bg-yellow-400 rounded-sm shadow-neon cyber-dot-yellow"></div>
    </div>

    <div class="flex-1 flex flex-col md:flex-row items-center justify-center z-10">
      <div class="flex flex-col items-center justify-center gap-1 w-full md:w-1/2 max-h-80 py-2 md:py-4">
        <div class="w-16 h-16 md:w-20 md:h-20 mx-auto z-30 relative -mt-6 md:mt-0">
          <img src="assets/img/leon.png" alt="PC Gamer CDMX" class="w-full h-full object-contain" />
        </div>

        <h1 class="text-xl md:text-2xl lg:text-4xl font-bold text-white text-center tracking-wide drop-shadow-[0_0_15px_#0ea5e9] whitespace-pre-line leading-none mx-4">
          <span>{{ typingText }}</span>
        </h1>
      </div>

      <div class="hidden md:flex absolute right-8 lg:right-12 bottom-28 lg:bottom-32 ultra:right-6 ultra:bottom-24 w-[28vw] min-w-[240px] max-w-[420px] h-[48vh] max-h-[520px] items-end justify-center">
        <img [src]="pcBuilds[pcIndex].img" alt="PC gamer ensamblada" class="pc-ensamble-img w-full h-full object-contain object-bottom" />
      </div>

      <div class="flex flex-col items-center w-full md:hidden mt-2 mb-5 px-4">
        <div class="w-full max-w-[420px] h-[42vh] min-h-[280px] max-h-[420px] flex items-end justify-center">
          <img [src]="pcBuilds[pcIndex].img" alt="PC gamer ensamblada" class="pc-ensamble-img w-full h-full object-contain object-bottom" />
        </div>
      </div>

      <div class="md:hidden w-full flex justify-center mt-8">
        <a [routerLink]="pcBuilds[pcIndex].link" class="btn-comprar-cyber py-3 px-8 w-[80%] text-center rounded-lg text-white bg-gradient-to-r from-pink-500 to-purple-500 shadow-lg hover:shadow-pink-500/50">
          Comprar
        </a>
      </div>
    </div>

    <div class="w-full hidden md:flex items-center px-8 py-3 bg-black/70 backdrop-blur border-t border-white z-40">
      <div class="flex gap-6">
        <a [href]="business.social.tiktok" target="_blank" rel="noopener noreferrer" class="social-btn-cyber" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
        <a [href]="business.social.facebook" target="_blank" rel="noopener noreferrer" class="social-btn-cyber" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a [href]="business.social.instagram" target="_blank" rel="noopener noreferrer" class="social-btn-cyber" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        <a [href]="business.whatsappUrl" target="_blank" rel="noopener noreferrer" class="social-btn-cyber" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
      </div>
      <div class="flex-1 flex">
        <div class="w-full flex justify-end">
          <a [routerLink]="pcBuilds[pcIndex].link" class="btn-comprar-cyber mr-4 xl:mr-14 ultra:text-sm">Comprar</a>
        </div>
      </div>
    </div>
  </section>

  <section class="min-h-screen flex flex-col relative items-center justify-center py-16 bg-[#090b20]">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-pink-500 to-transparent"></div>
      <div class="absolute top-0 left-0 w-px h-full bg-gradient-to-b from-transparent via-fuchsia-400 to-transparent"></div>
      <div class="absolute top-0 right-0 w-px h-full bg-gradient-to-b from-transparent via-pink-400 to-transparent"></div>
    </div>

    <h2 class="text-3xl md:text-4xl font-bold text-white mb-10 relative before:content-[''] before:absolute before:h-1 before:w-12 before:bg-pink-400 before:-bottom-3 before:left-1/2 before:-translate-x-1/2">
      Nuestros Paquetes
    </h2>

    <div class="relative w-full max-w-7xl px-4">
      <app-products-slider [products]="filteredCarruselProducts" [showArrows]="true" [showMobileIndicator]="true" [wasFiltered]="wasFiltered" (filterChange)="onCarouselReset()"></app-products-slider>
    </div>

    <div class="text-center mt-12">
      <a routerLink="/ensambles" class="bg-gradient-to-r from-pink-600 to-purple-600 text-white py-3 px-8 rounded-lg font-bold hover:from-pink-700 hover:to-purple-700 transition-all shadow-lg hover:shadow-pink-500/30">
        <i class="fas fa-cogs mr-2"></i>
        Ver todos los paquetes
      </a>
    </div>
  </section>

  <app-home-custom-cases-section [customCases]="customCases"></app-home-custom-cases-section>

  <section class="py-16 relative bg-[#0a0d22]">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
      <div class="absolute top-0 left-0 w-px h-full bg-gradient-to-b from-transparent via-red-500 to-transparent"></div>
      <div class="absolute top-0 right-0 w-px h-full bg-gradient-to-b from-transparent via-red-400 to-transparent"></div>
    </div>

    <h2 class="text-3xl md:text-4xl font-bold text-white text-center mb-8 relative before:content-[''] before:absolute before:h-1 before:w-12 before:bg-red-400 before:-bottom-3 before:left-1/2 before:-translate-x-1/2">
      Perifericos Gaming
    </h2>

    <div class="max-w-7xl mx-auto px-4">
      <app-peripherals-slider [items]="peripherals" [categories]="peripheralCategories" [showFilters]="true" [showArrows]="true" [showMobileIndicator]="true"></app-peripherals-slider>
    </div>

    <div class="text-center mt-8">
      <a routerLink="/productos/perifericos" class="inline-block bg-gradient-to-r from-red-600 to-pink-600 text-white py-3 px-8 rounded-lg font-bold hover:shadow-lg hover:shadow-red-500/30 transition-all">
        Ver todos los perifericos
      </a>
    </div>
  </section>

  <section class="py-16 relative bg-[#080a1e]">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-cyan-500 to-transparent"></div>
      <div class="absolute top-0 left-0 w-px h-full bg-gradient-to-b from-transparent via-purple-500 to-transparent"></div>
      <div class="absolute top-0 right-0 w-px h-full bg-gradient-to-b from-transparent via-blue-500 to-transparent"></div>
    </div>

    <div class="max-w-7xl mx-auto px-4">
      <div class="relative">
        <app-banners-slider #bannersSlider [banners]="banners" [autoPlay]="true" [autoPlayDelay]="5000" [showArrows]="false" [showIndicators]="true" [enableSwipe]="true" class="touch-pan-y"></app-banners-slider>

        <button type="button" class="hidden md:flex absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-black/50 hover:bg-black/70 text-white rounded-full items-center justify-center transition-all z-10" (click)="previousBanner()" aria-label="Banner anterior">
          <i class="fas fa-chevron-left"></i>
        </button>

        <button type="button" class="hidden md:flex absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 bg-black/50 hover:bg-black/70 text-white rounded-full items-center justify-center transition-all z-10" (click)="nextBanner()" aria-label="Siguiente banner">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>
  </section>

  <app-home-community-section [influencers]="influencers"></app-home-community-section>

  <app-brands-section></app-brands-section>

  <app-home-services-section [services]="services"></app-home-services-section>

  <app-home-blog-section [posts]="latestPosts"></app-home-blog-section>

  <app-home-project-request-section></app-home-project-request-section>
</div>
