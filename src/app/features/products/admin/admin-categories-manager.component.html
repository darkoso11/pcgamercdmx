<app-admin-header></app-admin-header>
<div class="min-h-screen bg-[#071029] text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Encabezado -->
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-cyan-400">
        <i class="fas fa-folder text-purple-400 mr-2"></i>Gestor de Categorías
      </h1>
    </div>

    <!-- Sección: Crear Nueva Categoría -->
    <div class="bg-[#0b1220] border border-white/10 rounded-lg p-6 mb-8">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
        <i class="fas fa-plus-circle text-cyan-400"></i>
        Crear Nueva Categoría
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Nombre *</label>
          <input
            type="text"
            [(ngModel)]="newCategory.name"
            placeholder="Ej: Gabinetes"
            class="w-full px-4 py-2 bg-[#071029] border border-white/20 rounded text-white placeholder-gray-500 focus:border-cyan-400 focus:outline-none transition"
          />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Descripción</label>
          <input
            type="text"
            [(ngModel)]="newCategory.description"
            placeholder="Descripción de la categoría"
            class="w-full px-4 py-2 bg-[#071029] border border-white/20 rounded text-white placeholder-gray-500 focus:border-cyan-400 focus:outline-none transition"
          />
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Ícono (opcional)</label>
          <input
            type="text"
            [(ngModel)]="newCategory.icon"
            placeholder="Ej: fa-box"
            class="w-full px-4 py-2 bg-[#071029] border border-white/20 rounded text-white placeholder-gray-500 focus:border-cyan-400 focus:outline-none transition"
          />
        </div>
        <button
          (click)="addCategory()"
          [disabled]="!newCategory.name.trim()"
          class="md:col-span-3 px-6 py-2 bg-cyan-600 hover:bg-cyan-700 disabled:bg-cyan-900 disabled:opacity-50 rounded font-semibold transition"
        >
          <i class="fas fa-plus mr-2"></i>Agregar Categoría
        </button>
      </div>
    </div>

    <!-- Lista de Categorías -->
    <div class="bg-[#0b1220] border border-white/10 rounded-lg overflow-hidden">
      <div class="p-6 border-b border-white/10">
        <h2 class="text-2xl font-bold flex items-center gap-2">
          <i class="fas fa-list text-pink-400"></i>
          Categorías Existentes
        </h2>
        <p class="text-sm text-gray-400 mt-2">Total: <span class="text-cyan-400 font-semibold">{{ categories.length }}</span></p>
      </div>

      <div *ngIf="categories.length > 0; else noCategories" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-[#081229] border-b border-white/10">
            <tr class="text-left">
              <th class="px-4 py-3 text-gray-400 font-semibold">
                <i class="fas fa-arrows-v text-gray-500 mr-2"></i>Orden
              </th>
              <th class="px-4 py-3 text-gray-400 font-semibold">Nombre</th>
              <th class="px-4 py-3 text-gray-400 font-semibold">Descripción</th>
              <th class="px-4 py-3 text-gray-400 font-semibold text-center">Productos</th>
              <th class="px-4 py-3 text-gray-400 font-semibold text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr
              *ngFor="let category of categories; let i = index"
              class="border-t border-white/10 hover:bg-white/5 transition"
            >
              <td class="px-4 py-3">
                <div class="flex gap-1">
                  <button
                    (click)="moveCategoryUp(i)"
                    [disabled]="i === 0"
                    class="text-gray-400 hover:text-cyan-400 disabled:opacity-30 transition"
                    title="Mover arriba"
                  >
                    <i class="fas fa-arrow-up"></i>
                  </button>
                  <button
                    (click)="moveCategoryDown(i)"
                    [disabled]="i === categories.length - 1"
                    class="text-gray-400 hover:text-cyan-400 disabled:opacity-30 transition"
                    title="Mover abajo"
                  >
                    <i class="fas fa-arrow-down"></i>
                  </button>
                </div>
              </td>
              <td class="px-4 py-3">
                <div *ngIf="!category.editing; else editingName" class="font-semibold">
                  <i *ngIf="category.icon" class="mr-2" [ngClass]="'fas ' + category.icon"></i>{{ category.name }}
                </div>
                <ng-template #editingName>
                  <input
                    type="text"
                    [(ngModel)]="editingCategory.name"
                    class="px-2 py-1 bg-[#071029] border border-white/20 rounded text-white focus:border-cyan-400 focus:outline-none transition"
                  />
                </ng-template>
              </td>
              <td class="px-4 py-3 text-gray-300">
                <div *ngIf="!category.editing; else editingDesc">
                  {{ category.description || '-' }}
                </div>
                <ng-template #editingDesc>
                  <input
                    type="text"
                    [(ngModel)]="editingCategory.description"
                    class="w-full px-2 py-1 bg-[#071029] border border-white/20 rounded text-white focus:border-cyan-400 focus:outline-none transition"
                  />
                </ng-template>
              </td>
              <td class="px-4 py-3 text-center text-cyan-400 font-semibold">
                {{ getProductCount(category.name) }}
              </td>
              <td class="px-4 py-3 text-center">
                <div class="flex gap-2 justify-center">
                  <button
                    *ngIf="!category.editing"
                    (click)="startEditing(i)"
                    class="text-yellow-400 hover:text-yellow-300 transition"
                    title="Editar"
                  >
                    <i class="fas fa-edit"></i>
                  </button>
                  <button
                    *ngIf="category.editing"
                    (click)="saveEdit(i)"
                    class="text-green-400 hover:text-green-300 transition"
                    title="Guardar"
                  >
                    <i class="fas fa-check"></i>
                  </button>
                  <button
                    *ngIf="category.editing"
                    (click)="cancelEdit()"
                    class="text-gray-400 hover:text-gray-300 transition"
                    title="Cancelar"
                  >
                    <i class="fas fa-times"></i>
                  </button>
                  <button
                    (click)="deleteCategory(i, category.name)"
                    class="text-red-400 hover:text-red-300 transition"
                    title="Eliminar"
                  >
                    <i class="fas fa-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <ng-template #noCategories>
        <div class="p-8 text-center">
          <i class="fas fa-inbox text-4xl text-gray-400 mb-4 block opacity-50"></i>
          <p class="text-gray-400">No hay categorías aún</p>
        </div>
      </ng-template>
    </div>
  </div>
</div>
